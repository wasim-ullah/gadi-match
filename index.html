<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gadi Match — What does your driving say about you?</title>
<meta name="description" content="Take the Gadi Match quiz and find your ideal car archetype in 60 seconds.">

<!-- Open Graph -->
<meta property="og:title" content="Gadi Match — What does your driving say about you?">
<meta property="og:description" content="A swipeable personality quiz that matches you to your ideal car archetype. Take it in under a minute.">
<meta property="og:type" content="website">
<meta property="og:image" content="https://gadi.co/og-image.jpg">
<meta property="og:url" content="https://gadi.co/match">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Gadi Match — What does your driving say about you?">
<meta name="twitter:description" content="A swipeable personality quiz that matches you to your ideal car archetype.">
<meta name="twitter:image" content="https://gadi.co/og-image.jpg">

<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app">

  <!-- LANDING -->
  <section id="screen-landing" class="screen active">
    <div class="landing-inner">
      <div class="wordmark">GADI<span class="accent">MATCH</span></div>
      <p class="hook">What does your driving say about you?</p>
      <button id="start-btn" class="btn-primary">Start</button>
      <p class="fine-print">8 questions · 60 seconds · no signup</p>
    </div>
  </section>

  <!-- QUIZ -->
  <section id="screen-quiz" class="screen">
    <div class="progress-track">
      <div id="progress-fill" class="progress-fill"></div>
    </div>
    <div id="card-stack" class="card-stack"></div>
  </section>

  <!-- RESULT -->
  <section id="screen-result" class="screen">
    <div class="result-inner">
      <p class="result-label">Your match is in</p>

      <div id="result-card" class="result-card">
        <div class="result-card-icon" id="result-icon"></div>
        <h2 id="result-name" class="result-name"></h2>
        <p id="result-tagline" class="result-tagline"></p>
      </div>

      <p id="result-desc" class="result-desc"></p>

      <div class="result-actions">
        <button id="share-btn" class="btn-secondary">Download / Share Result Card</button>
        <button id="retake-btn" class="btn-ghost">Retake Quiz</button>
      </div>

      <div class="paywall-block" id="paywall-block">
        <div class="paywall-lock">&#128274;</div>
        <div class="paywall-text">
          <p class="paywall-title">See your top 3 actual car matches</p>
          <p class="paywall-sub">With AED price ranges + where to find them in the UAE</p>
        </div>
        <a id="paywall-link" class="paywall-cta" href="https://buy.stripe.com/PLACEHOLDER_PAYMENT_LINK" target="_blank" rel="noopener">Unlock — $2</a>
      </div>
    </div>
  </section>

</div>

<canvas id="render-canvas" style="display:none;"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="script.js"></script>
</body>
</html>
